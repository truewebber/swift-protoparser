syntax = "proto2";

package fixtures.proto2;

enum Status {
  UNKNOWN = 0;
  ACTIVE  = 1;
  INACTIVE = 2;
}

message ScalarDefaults {
  optional double   f_double   = 1  [default = 1.5];
  optional float    f_float    = 2  [default = 2.5];
  optional int32    f_int32    = 3  [default = -42];
  optional int64    f_int64    = 4  [default = -123456789];
  optional uint32   f_uint32   = 5  [default = 100];
  optional uint64   f_uint64   = 6  [default = 200];
  optional sint32   f_sint32   = 7  [default = -7];
  optional sint64   f_sint64   = 8  [default = -8];
  optional fixed32  f_fixed32  = 9  [default = 9];
  optional fixed64  f_fixed64  = 10 [default = 10];
  optional sfixed32 f_sfixed32 = 11 [default = -11];
  optional sfixed64 f_sfixed64 = 12 [default = -12];
  optional bool     f_bool     = 13 [default = true];
  optional string   f_string   = 14 [default = "hello"];
  optional bytes    f_bytes    = 15 [default = "world"];
  optional Status   f_enum     = 16 [default = ACTIVE];
}
