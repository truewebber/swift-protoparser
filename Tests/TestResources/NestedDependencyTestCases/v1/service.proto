syntax = "proto3";

import "common/base.proto";

package nested.v1;

service ItemService {
  rpc GetItem(GetItemRequest) returns (GetItemResponse);
}

message GetItemRequest {
  string item_id = 1;
}

message GetItemResponse {
  nested.common.BaseItem item = 1;
  nested.common.BaseStatus status = 2;
}
